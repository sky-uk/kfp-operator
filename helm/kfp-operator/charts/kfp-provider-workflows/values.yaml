# Values for the kfp-provider-workflows chart.
# Install one release per provider namespace.

# Namespace the WorkflowTemplates, RBAC and Provider resource are created in.
# This must be the namespace the Provider runs in. Defaults to the release
# namespace when left empty.
namespace: ""

# The Argo execution configuration. Mirrors manager.argo in the kfp-operator
# chart so provider-namespace templates stay consistent with the operator.
manager:
  argo:
    # Gates the workflow-executor Role and its RoleBinding. Set to false to
    # manage these namespace-scoped resources externally.
    rbac:
      create: true
    serviceAccount:
      # ServiceAccount workflows run as. Created in the provider namespace.
      name: "kfp-operator-argo"
      # Whether to create the ServiceAccount. Set to false to reuse an
      # existing one.
      create: true
      metadata: {}
    containerDefaults: {}
    metadata: {}
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
    ttlStrategy:
      secondsAfterCompletion: 3600
    stepTimeoutSeconds:
      default: 300
      compile: 1800

# The Provider resource this release provisions workflows for.
provider:
  # When true, the chart also renders the Provider custom resource.
  create: true
  # Provider resource name. Defaults to the release name when left empty.
  name: ""
  # The provider service ServiceAccount, created in the provider namespace.
  # The cluster-scoped bindings this account needs (run/runconfiguration
  # viewer and, for KFP, eventing) are managed externally by the platform.
  serviceAccount:
    # ServiceAccount name. Defaults to kfp-provider-<provider-name> when
    # left empty.
    name: ""
    # Whether to create the ServiceAccount. Set to false to reuse an
    # existing one.
    create: true
    metadata: {}
  # Provider spec fields (see the Provider CRD reference).
  serviceImage: ""
  pipelineRootStorage: ""
  # Free-form provider parameters (map of name -> value).
  parameters: {}
  frameworks: []
  allowedNamespaces: []
  metadata: {}
