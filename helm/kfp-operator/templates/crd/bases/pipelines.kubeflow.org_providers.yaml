{{- if .Values.crds.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if and .Values.manager.multiversion.enabled (eq .Values.manager.webhookCertificates.provider "cert-manager") }}
    cert-manager.io/inject-ca-from: {{ .Values.namespace.name }}/{{ include "kfp-operator.fullname" . }}-serving-cert
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.19.0
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
  name: providers.pipelines.kubeflow.org
spec:
  group: pipelines.kubeflow.org
  names:
    kind: Provider
    listKind: ProviderList
    plural: providers
    shortNames:
    - mlprv
    singular: provider
  scope: Namespaced
  {{- if .Values.manager.multiversion.enabled }}
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: {{ include "kfp-operator.fullname" . }}-webhook-service
          namespace: {{ .Values.namespace.name }}
          path: /convert
        {{- if and .Values.manager.multiversion.enabled (eq .Values.manager.webhookCertificates.provider "custom") }}
        caBundle: {{ .Values.manager.webhookCertificates.caBundle }}
        {{- end }}
      conversionReviewVersions:
      - v1
  {{- end }}
  versions:
  {{- if .Values.manager.multiversion.enabled }}
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type == 'Synchronized')].reason
      name: SynchronizationState
      type: string
