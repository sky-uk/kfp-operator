apiVersion: pipelines.kubeflow.org/v1beta1
kind: RunConfiguration
metadata:
    name: quickstart-tfx-kfp2-recurring-run
spec:
  run:
    provider: provider-namespace/provider-name
    pipeline: quickstart-tfx-kfp2
    parameters:
    - name: push_destination
      value: '{"filesystem":{"base_directory":"gs://my-bucket/quickstart-tfx-kfp2"}}'
  triggers:
    onChange:
    - pipeline
    - runSpec
